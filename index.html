<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40歳からの美痩せ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#C4556A;--rose-lt:#F9EEF0;--rose-mid:#E8A0AD;--gold:#B8955A;--gold-lt:#FBF5EA;--gold-mid:#D4B483;--sage:#7A9E8E;--sage-lt:#EEF5F2;--lav:#8B7BAB;--lav-lt:#F2F0F8;--cream:#FDF8F3;--dark:#2C2015;--mid:#6B5B4E;--font:'Shippori Mincho','Hiragino Mincho ProN',serif}
body{font-family:var(--font);background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px 20px;max-width:480px}
.title{font-size:28px;font-weight:800;color:var(--rose);margin:20px 0 10px}
.sub{font-size:14px;color:var(--mid);margin-bottom:30px;line-height:1.6}
.btn{background:linear-gradient(135deg,var(--rose),#9B3A50);color:#fff;font-family:var(--font);font-size:16px;font-weight:700;letter-spacing:0.15em;border:none;border-radius:999px;padding:16px 40px;box-shadow:0 4px 18px rgba(196,85,106,0.32);cursor:pointer;text-decoration:none;display:inline-block;margin-top:10px}
.img{width:160px;height:160px;border-radius:50%;object-fit:cover;object-position:center 8%;border:3px solid var(--rose-mid);box-shadow:0 6px 28px rgba(196,85,106,0.3)}
</style>
</head>
<body>
<div class="container">
<img class="img" src="https://cdn.jsdelivr.net/gh/chise0720/hyoushi2@main/%E8%A1%A8%E7%B4%99.png" alt="美魔女" onerror="this.textContent='🌸';this.style.fontSize='64px'"/>
<div class="title">40歳からの<span style="color:var(--rose)">美痩せ</span>診断</div>
<div class="sub">なぜ痩せないのか。<br>その本当の理由を体と心から見つけます。</div>
<a href="https://biyase-shindan-app.vercel.app" class="btn">❖ 無料で診断をはじめる ❖</a>
</div>
</body>
</html>
